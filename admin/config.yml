backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "pages"
    label: "Pages"
    files:
      - name: "home"
        label: "Home Page"
        file: "content/home.json"
        fields:
          - {label: "Hero Title", name: "heroTitle", widget: "string"}
          - {label: "Hero Subtitle", name: "heroSubtitle", widget: "text"}
          - {label: "Stats - Placements", name: "statsPlacement", widget: "string"}
          - {label: "Stats - Clients", name: "statsClients", widget: "string"}
          - {label: "Stats - Years", name: "statsYears", widget: "string"}
          - {label: "Stats - Success Rate", name: "statsSuccess", widget: "string"}
          
      - name: "about"
        label: "About Page"
        file: "content/about.json"
        fields:
          - {label: "Page Title", name: "title", widget: "string"}
          - {label: "Subtitle", name: "subtitle", widget: "string"}
          - {label: "Our Story", name: "story", widget: "markdown"}
          
      - name: "contact"
        label: "Contact Info"
        file: "content/contact.json"
        fields:
          - {label: "Address", name: "address", widget: "text"}
          - {label: "Phone", name: "phone", widget: "string"}
          - {label: "Email", name: "email", widget: "string"}
          - {label: "Business Hours", name: "hours", widget: "text"}

  - name: "services"
    label: "Services"
    folder: "content/services"
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Title", name: "title", widget: "string"}
      - {label: "Icon (emoji)", name: "icon", widget: "string"}
      - {label: "Description", name: "description", widget: "text"}
      - {label: "Order", name: "order", widget: "number"}

  - name: "settings"
    label: "Site Settings"
    files:
      - name: "general"
        label: "General Settings"
        file: "content/settings.json"
        fields:
          - {label: "Company Name", name: "companyName", widget: "string"}
          - {label: "Tagline", name: "tagline", widget: "string"}
          - {label: "Logo", name: "logo", widget: "image"}
          - {label: "Footer Text", name: "footerText", widget: "string"}
          - {label: "Copyright Year", name: "copyrightYear", widget: "string"}
