<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EliteSeeker Admin - Login</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .login-container {
      background: white;
      padding: 3rem;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .logo h1 {
      color: #0f4c81;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
    }
    
    .logo span {
      color: #666;
      font-size: 0.9rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    label {
      display: block;
      margin-bottom: 0.5rem;
      color: #333;
      font-weight: 500;
    }
    
    input {
      width: 100%;
      padding: 0.875rem 1rem;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    
    input:focus {
      outline: none;
      border-color: #0f4c81;
    }
    
    button {
      width: 100%;
      padding: 1rem;
      background: #0f4c81;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    button:hover {
      background: #0a3d6a;
    }
    
    .error {
      background: #ffebee;
      color: #c62828;
      padding: 0.875rem;
      border-radius: 8px;
      margin-bottom: 1.5rem;
      display: none;
      text-align: center;
    }
    
    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <h1>EliteSeeker</h1>
      <span>Admin Panel</span>
    </div>
    
    <div id="error" class="error">Invalid username or password</div>
    
    <form id="loginForm">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username">
      </div>
      
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      
      <button type="submit">Sign In</button>
    </form>
  </div>

  <script>
    // SHA-256 hash of "Asdf1234"
    const VALID_PASSWORD_HASH = 'fb134ab7da573c6d9679e41927fcaabf88086fd493d5cc91d39e96b2e4ab3773';
    const VALID_USERNAME = 'admin';
    
    // Simple SHA-256 implementation using SubtleCrypto
    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }
    
    // Generate session token
    function generateToken() {
      const array = new Uint8Array(32);
      crypto.getRandomValues(array);
      return Array.from(array, b => b.toString(16).padStart(2, '0')).join('');
    }
    
    // Check if already logged in
    if (sessionStorage.getItem('eliteseeker_session')) {
      window.location.href = 'dashboard.html';
    }
    
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorEl = document.getElementById('error');
      
      errorEl.classList.remove('show');
      
      const passwordHash = await sha256(password);
      
      if (username === VALID_USERNAME && passwordHash === VALID_PASSWORD_HASH) {
        // Create session
        const token = generateToken();
        const session = {
          token: token,
          user: username,
          expires: Date.now() + (24 * 60 * 60 * 1000) // 24 hours
        };
        sessionStorage.setItem('eliteseeker_session', JSON.stringify(session));
        window.location.href = 'dashboard.html';
      } else {
        errorEl.classList.add('show');
      }
    });
  </script>
</body>
</html>
